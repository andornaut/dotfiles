general {
    #lock_cmd = pidof hyprlock || hyprlock
    lock_cmd = hyprlock
    before_sleep_cmd = loginctl lock-session
    #after_sleep_cmd = brightnessctl -r
}

#listener {
#    timeout = 180 # 3min.
